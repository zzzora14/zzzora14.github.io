<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moviefinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">

<style>
    body{
        background: #121212;
        color : white;
        min-height: 100vh;
    }
    .moviecard{
        transition: transform 0.2s ease;
        height: 100%;
    }
    .moviecard:hover{
        transform: scale(1.03);
    }
    .movieposter{
        height: 400px;
        object-fit: cover;
    }
    .searchbox{
        max-width: 700px;
        margin:auto;
    }
</style></head>
<body>
  <div class="container py-5">
    <h1 class="text-center mb-4 fw-bold"><i class="bi bi-film"></i> Movie Finder</h1><div class="search-box mb-5">
  <div class="input-group input-group-ig">
    <input type="text" id="searchInput" class="form-control" placeholder="Search Movies...">
    <button class="btn btn-primary" id="searchButton">Search</button>
  </div>
</div>
<div id="load" class="text-center d-none">
    <div class="spinner-border text-light" role="status"></div>
    <p class="mt-2">Loading...</p>
</div>
<div id="movieContainer" class="row g-4"></div>
</div>
<script>
    const API_KEY = "7029aa70";
    const searchInput= document.getElementById("searchInput") ;
    const searchButton= document.getElementById("searchButton") ;   
    const movieContainer= document.getElementById('movieContainer') ;
    const load= document.getElementById('load') ;
    async function searchMovies() {
        const query = searchInput.value.trim();
        if (!query) {
            alert('Please enter a movie name');
        }
        movieContainer.innerHTML = '';
        load.classList.remove('d-none');
        try {
            const response = await fetch(
                `https://www.omdbapi.com/?apikey=${API_KEY}&s=${query}`
            );
            const data = await response.json();
            load.classList.add('d-none');
            if(data.response == 'False'){
                movieContainer.innerHTML = 
                    `<div class="col-12">
                        <div class="alert alert-danger text-center">${data.Error};
                        </div>
                    </div>
                `;
                return;
            }
            await displayMovies(data.Search);
        } catch (error) {
            load.classList.add(d-none);
            movieContainer.innerHTML = `
              <div class="col-12">
                <div class ="alert alert-danger text-center">Failed to fetch data.</div>
              </div>
            `;
            console.error(error);
            
        }
        
    }
    async function getMovieDetails(imdbID) {
        const response =  await fetch(
          `https://www.omdbapi.com/?apikey=${API_KEY}&i=${imdbID}&plot=short`
        );
        return await response.json();
    }

    async function displayMovies(movies) {
        movieContainer.innerHTML = '';
        for (const movie of movies) {
            const details = await getMovieDetails(movie.imdbID);
            const poster =  movie.Poster !== 'N/A'?
            movie.Poster:
            'https://placehold.co/600x400/EEE/31343C';
            const rating = details.imdbRating !== 'N/A'
            ?details.imdbRating
            :'No Rating';
            const plot = details.Plot
            ?details.Plot
            :'No synopsis available'

            movieContainer.innerHTML += `
              <div class='col-md-6 col-lg-4 col-xl-3'>
                <div class='card bg-dark text-white movie-card shadow-lg border-0 h-100'>
                    <img src='${poster}' class='card-img-top movie-poster' alt='${movie.Title}'>
                    <div class='card-body-d-flex flex-column'>
                        <h5 class ='card-title'>${movie.Title}</h5>
                        <p class='card-text mb-1'><strong>Year:</strong> ${movie.Year}</p>
                        <p class='card-text mb-1'><strong>Type:</strong> ${movie.Type}</p>
                        <p class='card-text mb-2'>⭐<strong>IMDb Rating:</strong> ${rating}</p>
                        <p class = 'card-text small flex-grow-1'>${plot}</p>
                        <a
                        href="https://www.imdb.com/title/${movie.imdbID}"
                        target="_blank"
                        class ='btn btn-outline-light mt-3'
                        >
                          View on IMDb
                        </a>
                    </div>
                </div>
            </div>
        `;
            
        }
    }
    searchButton.addEventListener('click', searchMovies);
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchMovies();
        }
    })
</script>
</body>
</html>
